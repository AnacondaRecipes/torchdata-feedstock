{% set name = "torchdata" %}
{% set version = "0.11.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/pytorch/data/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 945c53a8587567624aaad2d66204fbae9acb9535696554c53ffeb83320c308b9

build:
  number: 0
  skip: true  # [py<39]
  script:
    - set USE_SYSTEM_LIBS=TRUE  # [win]
    - export USE_SYSTEM_LIBS=TRUE  # [unix]
    - {{ PYTHON }} -m pip install --no-deps --ignore-installed --no-build-isolation . -vv

    # from torch.testing._internal.common_utils import TestCase
# ../../_test_env_placehold_placehold_placehold_placehold_placehold_placehold_placehold_placehold_placehold_placehold_placehold_placehold_placehold_placehold_placeh/lib/python3.10/site-packages/torch/__init__.py:409: in <module>
    # from torch._C import *  # noqa: F403
# E   ImportError: dlopen($PREFIX/lib/python3.10/site-packages/torch/_C.cpython-310-darwin.so, 0x0002): Symbol not found: __ZN2at3mps14getMPSProfilerEv
# E     Referenced from: <87990CDC-8638-3D8A-A1BC-5D5F1AFAC55E> $PREFIX/lib/libtorch_python.dylib
# E     Expected in:     <EF517B96-4CE4-357A-A9AB-03F243F0861C> $PREFIX/lib/libtorch_cpu.dylib

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake
    - ninja
  host:
    - pip
    - python
    - pytorch 2.7.0
    - setuptools
    - wheel
  run:
    - python
    - requests
    - urllib3 >=1.25
    - portalocker >=2.0.0
    - pytorch 2.7.0

test:
  imports:
    - torchdata
  requires:
    - pip
    - pytest
    - datasets  >=2.19.1
    - expecttest
    - fsspec
    - s3fs
    - parameterized
  source_files:
    - test

about:
  home: https://pytorch.org
  summary: A PyTorch repo for data loading and utilities to be shared by the PyTorch domain libraries.
  description: |
    torchdata is a library of common modular data loading primitives for easily constructing flexible 
    and performant data pipelines. It aims to provide composable Iterable-style and Map-style building
    blocks called DataPipes that work well out of the box with the PyTorch's DataLoader.
  license_family: BSD
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/pytorch/data
  doc_url: https://pytorch.org/data/beta/index.html

extra:
  recipe-maintainers:
    - BastianZim
    - Tobias-Fischer
    - h-vetinari
